<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generador de Órdenes · Central Trade Distribution</title>
  <meta name="description" content="Crea tu orden mayorista de Central Trade Distribution y envíala por WhatsApp." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="../CTDLOGO.PNG" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       VARIABLES Y BASE
       ============================================================ */
    :root {
      --green:       #247232;
      --green-dark:  #1a5526;
      --green-light: #2e8a3d;
      --green-50:    #e8f3ea;
      --green-100:   #d0e7d4;
      --red:         #db2c1a;
      --orange:      #f89429;
      --whatsapp:    #25d366;
      --whatsapp-dk: #1da851;
      --text:        #1a2e1f;
      --text-soft:   #4a5d4f;
      --muted:       #7a8a7e;
      --bg:          #f5faf6;
      --card:        #ffffff;
      --border:      #e3ede5;
      --radio:       14px;
      --sombra:      0 2px 8px rgba(36,114,50,0.06), 0 8px 24px rgba(36,114,50,0.04);
      --sombra-hover:0 4px 16px rgba(36,114,50,0.10), 0 16px 40px rgba(36,114,50,0.08);
      --sombra-fab:  0 10px 30px rgba(36,114,50,0.40);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      padding-bottom: 100px; /* espacio para FAB */
    }
    img { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }
    button, input, select, textarea { font-family: inherit; }
    button { cursor: pointer; }
    .hidden { display: none !important; }

    /* ============================================================
       TOP BAR
       ============================================================ */
    .top-bar {
      background: white;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0;
      z-index: 100;
    }
    .top-bar-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .top-bar a.logo-link {
      display: flex; align-items: center;
      gap: 8px;
      font-weight: 800;
      font-size: 0.85rem;
      color: var(--green);
    }
    .top-bar a.logo-link img { height: 30px; width: auto; }
    .top-bar .crumb {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 500;
    }
    .top-bar .crumb::before { content: '/'; margin: 0 6px; color: var(--border); }
    @media (max-width: 480px) {
      .top-bar a.logo-link span { display: none; }
    }

    /* ============================================================
       HERO compacto
       ============================================================ */
    .hero {
      background: linear-gradient(135deg, var(--green-dark) 0%, var(--green) 60%, var(--green-light) 100%);
      color: white;
      padding: 24px 16px 26px;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute;
      width: 280px; height: 280px; border-radius: 50%;
      background: var(--orange); filter: blur(50px); opacity: 0.22;
      top: -100px; right: -80px;
    }
    .hero-inner {
      max-width: 1280px; margin: 0 auto;
      position: relative; z-index: 1;
    }
    .hero h1 {
      font-size: clamp(1.4rem, 4vw, 1.8rem);
      font-weight: 800;
      letter-spacing: -0.01em;
      margin-bottom: 4px;
    }
    .hero p { font-size: 0.9rem; opacity: 0.92; }

    /* ============================================================
       CONTROLS — search + cat chips
       ============================================================ */
    .controls {
      background: white;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 54px;
      z-index: 90;
    }
    .controls-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 10px 16px;
    }
    .search-wrap {
      position: relative;
      margin-bottom: 10px;
    }
    .search-wrap::before {
      content: '🔍';
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      font-size: 0.9rem; opacity: 0.5;
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      padding: 10px 14px 10px 36px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.92rem;
      background: var(--bg);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .search-input:focus { border-color: var(--green); background: white; }
    .cat-nav {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: thin;
    }
    .cat-nav::-webkit-scrollbar { height: 4px; }
    .cat-nav::-webkit-scrollbar-thumb { background: var(--green-100); border-radius: 2px; }
    .cat-chip {
      flex: 0 0 auto;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--bg);
      color: var(--text-soft);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
      white-space: nowrap;
      font-family: inherit;
    }
    .cat-chip:hover { background: var(--green-50); color: var(--green); }
    .cat-chip.active { background: var(--green); color: white; border-color: var(--green); }
    .cat-chip .cnt { opacity: 0.7; font-weight: 500; margin-left: 3px; }

    /* ============================================================
       MAIN GRID
       ============================================================ */
    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 16px 16px;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    @media (min-width: 700px)  { .product-grid { grid-template-columns: repeat(3, 1fr); gap: 14px; } }
    @media (min-width: 1000px) { .product-grid { grid-template-columns: repeat(4, 1fr); } }

    /* Product card */
    .product-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radio);
      overflow: hidden;
      box-shadow: var(--sombra);
      transition: all 0.18s;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .product-card.has-qty {
      border-color: var(--green);
      box-shadow: 0 4px 16px rgba(36,114,50,0.18);
      background: linear-gradient(180deg, #f4faf5 0%, white 60%);
    }
    .product-card.has-qty::before {
      content: '';
      position: absolute; inset: 0;
      pointer-events: none;
      border-radius: var(--radio);
      box-shadow: inset 0 0 0 2px var(--green);
    }
    .product-img-wrap {
      aspect-ratio: 1;
      background: #ffffff;
      display: flex; align-items: center; justify-content: center;
      padding: 10px;
      position: relative;
      overflow: hidden;
    }
    .product-img-wrap img {
      max-width: 100%; max-height: 100%;
      object-fit: contain;
    }
    .product-img-fallback {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--green-50);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem;
      color: var(--green); opacity: 0.5;
    }
    .product-info {
      padding: 10px 10px 12px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .product-plu {
      font-size: 0.66rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .product-plu .plu-num {
      color: var(--green);
      background: var(--green-50);
      padding: 1px 6px;
      border-radius: 4px;
      margin-left: 3px;
      letter-spacing: 0.02em;
    }
    .product-name {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.25;
      letter-spacing: -0.005em;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-top: 2px;
      min-height: 2.3em;
    }
    .product-meta-row {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
      margin-top: 2px;
    }
    .product-brand {
      font-size: 0.68rem;
      color: var(--green);
      font-weight: 700;
    }
    .product-pkg {
      font-size: 0.68rem;
      color: var(--muted);
      font-weight: 500;
    }
    .product-pkg::before { content: '·'; margin: 0 3px; color: var(--border); }
    .product-price {
      font-size: 1rem;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.01em;
      margin-top: 6px;
    }
    .product-price .currency {
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 600;
      margin-right: 1px;
    }
    .product-price .per {
      font-size: 0.7rem;
      color: var(--muted);
      font-weight: 500;
      margin-left: 3px;
    }

    /* QUANTITY CONTROL */
    .qty-controls {
      display: flex;
      align-items: stretch;
      gap: 0;
      margin-top: 10px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: white;
      transition: border-color 0.15s;
    }
    .product-card.has-qty .qty-controls { border-color: var(--green); }
    .qty-btn {
      flex: 0 0 auto;
      width: 36px;
      border: none;
      background: white;
      color: var(--green);
      font-size: 1.2rem;
      font-weight: 700;
      transition: all 0.12s;
      display: flex; align-items: center; justify-content: center;
    }
    .qty-btn:hover { background: var(--green-50); }
    .qty-btn:disabled { color: var(--border); cursor: not-allowed; background: white; }
    .qty-btn.plus { background: var(--green); color: white; }
    .qty-btn.plus:hover { background: var(--green-dark); }
    .qty-display {
      flex: 1;
      text-align: center;
      font-weight: 800;
      font-size: 0.95rem;
      color: var(--text);
      padding: 6px 0;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      background: var(--bg);
      min-width: 0;
    }
    .product-card.has-qty .qty-display {
      background: var(--green-50);
      color: var(--green);
    }

    /* ============================================================
       FAB (floating cart summary)
       ============================================================ */
    .fab {
      position: fixed;
      bottom: 16px; left: 16px; right: 16px;
      background: var(--green);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 0.98rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--sombra-fab);
      z-index: 80;
      transition: all 0.2s;
      font-family: inherit;
      max-width: 600px;
      margin: 0 auto;
    }
    .fab:not(.empty):hover { background: var(--green-dark); transform: translateY(-2px); }
    .fab.empty {
      background: var(--text-soft);
      opacity: 0.85;
      cursor: not-allowed;
    }
    .fab .left { display: flex; align-items: center; gap: 10px; }
    .fab .icon { font-size: 1.2rem; }
    .fab .text-lines { display: flex; flex-direction: column; align-items: flex-start; gap: 1px; text-align: left; }
    .fab .items-line { font-size: 0.72rem; opacity: 0.9; font-weight: 600; letter-spacing: 0.02em; }
    .fab .arrow { font-size: 1rem; opacity: 0.85; }
    @media (min-width: 700px) {
      .fab {
        bottom: 24px; right: 24px; left: auto;
        max-width: 360px;
      }
    }

    /* ============================================================
       MODAL — Order preview
       ============================================================ */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(20,40,25,0.65);
      backdrop-filter: blur(4px);
      display: none;
      align-items: flex-end; justify-content: center;
      z-index: 200;
      animation: fadeIn 0.2s ease;
    }
    @media (min-width: 700px) {
      .modal-overlay { align-items: center; padding: 24px; }
    }
    .modal-overlay.visible { display: flex; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      background: white;
      width: 100%;
      max-width: 600px;
      max-height: 95vh;
      display: flex;
      flex-direction: column;
      border-radius: 18px 18px 0 0;
      box-shadow: 0 -10px 40px rgba(0,0,0,0.25);
      animation: slideUp 0.25s ease;
    }
    @media (min-width: 700px) {
      .modal { border-radius: 18px; max-height: 92vh; }
    }
    @keyframes slideUp { from { transform: translateY(40px); opacity: 0.6; } to { transform: translateY(0); opacity: 1; } }

    .modal-header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--green);
      color: white;
      border-radius: 18px 18px 0 0;
    }
    .modal-header h2 { font-size: 1.05rem; font-weight: 800; }
    .modal-close {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.2);
      color: white;
      font-size: 1rem;
    }
    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
    }
    .order-line {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .order-line:last-of-type { border-bottom: none; }
    .order-line-img {
      width: 52px; height: 52px;
      background: #f7faf8;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }
    .order-line-img img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .order-line-info { flex: 1; min-width: 0; }
    .order-line-info .nm {
      font-size: 0.85rem; font-weight: 700;
      line-height: 1.25;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .order-line-info .meta { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
    .order-line-qty {
      display: flex; align-items: center; gap: 4px;
      flex-shrink: 0;
    }
    .order-line-qty button {
      width: 26px; height: 26px;
      border: 1.5px solid var(--green-100);
      background: white;
      color: var(--green);
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .order-line-qty button:hover { background: var(--green-50); }
    .order-line-qty .qty-n {
      min-width: 24px;
      text-align: center;
      font-weight: 800;
      font-size: 0.85rem;
    }
    .order-line-subtotal {
      flex-shrink: 0;
      font-weight: 800;
      font-size: 0.9rem;
      color: var(--text);
      min-width: 60px;
      text-align: right;
    }

    .order-form {
      padding: 14px 0 0;
      margin-top: 10px;
      border-top: 1px dashed var(--border);
    }
    .form-row { margin-bottom: 12px; }
    .form-row label {
      display: block;
      font-size: 0.72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .form-row label .req { color: var(--red); }
    .form-row input, .form-row textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 0.92rem;
      color: var(--text);
      background: white;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    .form-row input:focus, .form-row textarea:focus { border-color: var(--green); }
    .form-row textarea { resize: vertical; min-height: 60px; }
    .form-row.error input, .form-row.error textarea { border-color: var(--red); }

    .order-total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0 4px;
      margin-top: 8px;
      border-top: 2px solid var(--green);
    }
    .order-total-row .lbl { font-size: 0.85rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
    .order-total-row .val { font-size: 1.4rem; font-weight: 900; color: var(--green); letter-spacing: -0.02em; }

    .empty-state {
      text-align: center;
      padding: 50px 20px 20px;
      color: var(--muted);
    }
    .empty-state .emoji { font-size: 3rem; display: block; margin-bottom: 10px; opacity: 0.4; }

    .modal-footer {
      padding: 14px 16px calc(14px + env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      background: white;
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-radius: 0 0 18px 18px;
    }
    .btn {
      padding: 13px 18px;
      border-radius: 12px;
      border: none;
      font-size: 0.95rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.18s;
      font-family: inherit;
    }
    .btn-wa {
      background: var(--whatsapp);
      color: white;
      box-shadow: 0 4px 12px rgba(37,211,102,0.35);
    }
    .btn-wa:hover {
      background: var(--whatsapp-dk);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(37,211,102,0.45);
    }
    .btn-wa:disabled {
      background: #c8d6cb;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }
    .btn-clear {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      font-weight: 600;
      font-size: 0.85rem;
      padding: 10px;
    }
    .btn-clear:hover { color: var(--red); border-color: var(--red); }

    /* Error toast */
    .toast {
      position: fixed;
      top: 80px; left: 50%;
      transform: translateX(-50%);
      background: var(--red);
      color: white;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 0.88rem;
      font-weight: 600;
      box-shadow: 0 6px 20px rgba(219,44,26,0.35);
      z-index: 250;
      animation: toastIn 0.25s ease;
    }
    @keyframes toastIn { from { transform: translate(-50%, -10px); opacity: 0; } }

    /* Loading state */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .loading .spinner {
      width: 32px; height: 32px;
      margin: 0 auto 14px;
      border: 3px solid var(--green-100);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .no-results {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .no-results .emoji { font-size: 2.6rem; display: block; margin-bottom: 10px; opacity: 0.5; }
  </style>
</head>
<body>

  <!-- ══════════ TOP BAR ══════════ -->
  <div class="top-bar">
    <div class="top-bar-inner">
      <a class="logo-link" href="../">
        <img src="../CTDLOGO.PNG" alt="CTD" />
        <span>CENTRAL TRADE DISTRIBUTION</span>
      </a>
      <span class="crumb">Generador de Órdenes</span>
    </div>
  </div>

  <!-- ══════════ HERO ══════════ -->
  <section class="hero">
    <div class="hero-inner">
      <h1>📦 Generador de Órdenes</h1>
      <p>Arma tu pedido, agrega cantidades y envíalo por WhatsApp.</p>
    </div>
  </section>

  <!-- ══════════ CONTROLS ══════════ -->
  <div class="controls">
    <div class="controls-inner">
      <div class="search-wrap">
        <input type="text" id="searchInput" class="search-input"
               placeholder="Buscar por nombre o PLU…"
               autocomplete="off" />
      </div>
      <nav class="cat-nav" id="catNav"></nav>
    </div>
  </div>

  <!-- ══════════ MAIN ══════════ -->
  <main>
    <div class="loading" id="loadingMsg">
      <div class="spinner"></div>
      Cargando productos…
    </div>
    <div class="product-grid hidden" id="productGrid"></div>
    <div class="no-results hidden" id="noResults">
      <span class="emoji">🔍</span>
      <p>No se encontraron productos.</p>
    </div>
  </main>

  <!-- ══════════ FAB ══════════ -->
  <button class="fab empty" id="fabBtn" disabled>
    <div class="left">
      <span class="icon">🛒</span>
      <div class="text-lines">
        <span class="main"><span id="fabLabel">Tu orden está vacía</span></span>
        <span class="items-line" id="fabItems">Agrega productos para empezar</span>
      </div>
    </div>
    <span class="arrow">→</span>
  </button>

  <!-- ══════════ MODAL ══════════ -->
  <div class="modal-overlay" id="orderModal" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal-header">
        <h2 id="modalTitle">📋 Mi Orden</h2>
        <button class="modal-close" id="modalClose" aria-label="Cerrar">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <a class="btn btn-wa" id="sendWaBtn" target="_blank" rel="noopener">
          <span>💬</span>
          <span>Enviar por WhatsApp</span>
        </a>
        <button class="btn btn-clear" id="clearBtn">Vaciar orden</button>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    // CONFIG
    // ============================================================
    const WHATSAPP_NUMBER = '19133688814';
    const STORAGE_KEY = 'ctd_produce_order_v1';
    const FORM_KEY = 'ctd_produce_form_v1';

    // ============================================================
    // STATE
    // ============================================================
    let PRODUCTS = [];                     // todos los productos
    const QTY = {};                        // { plu: cantidad }
    let _query = '';
    let _catFilter = '';
    let _formData = { customer: '', notes: '' };

    const CAT_EMOJI = {
      'Frutas y Vegetales Frescos':'🥬','Bebidas':'🥤','Lácteos':'🧀','Carnicería':'🥩',
      'Refrigerados':'❄️','Congelados':'🧊','Abarrotes':'🛒','Granos':'🌾',
      'Harinas':'🌾','Condimentos':'🌶️','Conservas':'🥫','Galletas':'🍪',
      'Dulces':'🍬','Snacks y Botanas':'🥨'
    };

    const CAT_ORDER = [
      'Frutas y Vegetales Frescos','Bebidas','Lácteos','Carnicería',
      'Refrigerados','Congelados','Abarrotes','Granos','Harinas',
      'Condimentos','Conservas','Galletas','Dulces','Snacks y Botanas'
    ];

    // ============================================================
    // HELPERS
    // ============================================================
    const $ = s => document.querySelector(s);
    const $$ = s => document.querySelectorAll(s);
    const esc = s => String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    const fmt$ = n => `$${Number(n).toFixed(2)}`;

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        Object.assign(QTY, saved);
      } catch (e) {}
      try {
        const f = JSON.parse(localStorage.getItem(FORM_KEY)) || {};
        Object.assign(_formData, f);
      } catch (e) {}
    }
    function saveState() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(QTY)); } catch (e) {}
    }
    function saveForm() {
      try { localStorage.setItem(FORM_KEY, JSON.stringify(_formData)); } catch (e) {}
    }

    function showToast(msg) {
      const old = $('.toast'); if (old) old.remove();
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2400);
    }

    // ============================================================
    // CSV PARSER (con quoted-field support)
    // ============================================================
    function parseCSV(text) {
      const rows = []; let row = []; let field = ''; let inQ = false;
      const src = text.replace(/\r/g, '');
      for (let i = 0; i < src.length; i++) {
        const ch = src[i];
        if (inQ) {
          if (ch === '"') { if (src[i+1] === '"') { field += '"'; i++; } else inQ = false; }
          else field += ch;
        } else {
          if (ch === '"') inQ = true;
          else if (ch === ',') { row.push(field); field = ''; }
          else if (ch === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
          else field += ch;
        }
      }
      if (field || row.length) { row.push(field); rows.push(row); }
      rows.shift(); // header
      return rows
        .filter(r => r.length >= 4 && r[0].trim().length > 0)
        .map(r => ({
          name:     (r[0] || '').trim(),
          category: (r[1] || '').trim(),
          brand:    (r[2] || '').trim(),
          image:    (r[3] || '').trim(),
          plu:      (r[4] || '').trim(),
          barcode:  (r[5] || '').trim(),
          pkg:      (r[6] || '').trim(),
          price:    parseFloat(r[7]) || 0
        }));
    }

    // ============================================================
    // CAT NAV (chips de filtrado)
    // ============================================================
    function renderCatNav() {
      const nav = $('#catNav');
      const counts = {};
      PRODUCTS.forEach(p => counts[p.category] = (counts[p.category]||0)+1);
      const cats = CAT_ORDER.filter(c => counts[c] > 0);

      nav.innerHTML = [
        `<button class="cat-chip active" data-cat="">Todas <span class="cnt">${PRODUCTS.length}</span></button>`,
        ...cats.map(c => `<button class="cat-chip" data-cat="${esc(c)}">${CAT_EMOJI[c]||''} ${esc(c)} <span class="cnt">${counts[c]}</span></button>`)
      ].join('');

      nav.querySelectorAll('.cat-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          nav.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
          chip.classList.add('active');
          _catFilter = chip.dataset.cat;
          renderGrid();
        });
      });
    }

    // ============================================================
    // PRODUCT GRID
    // ============================================================
    function renderGrid() {
      const grid = $('#productGrid');
      const q = _query;
      const cat = _catFilter;

      const items = PRODUCTS.filter(p => {
        if (cat && p.category !== cat) return false;
        if (q) {
          const hay = p.name.toUpperCase() + ' ' + p.plu + ' ' + p.brand.toUpperCase();
          if (!hay.includes(q)) return false;
        }
        return true;
      });

      $('#loadingMsg').classList.add('hidden');
      $('#noResults').classList.toggle('hidden', items.length > 0);
      grid.classList.toggle('hidden', items.length === 0);

      grid.innerHTML = items.map(p => productCard(p)).join('');

      // wire qty controls
      grid.querySelectorAll('[data-action="inc"]').forEach(b => {
        b.addEventListener('click', () => changeQty(b.dataset.plu, +1));
      });
      grid.querySelectorAll('[data-action="dec"]').forEach(b => {
        b.addEventListener('click', () => changeQty(b.dataset.plu, -1));
      });
    }

    function productCard(p) {
      const fb = CAT_EMOJI[p.category] || '📦';
      const qty = QTY[p.plu] || 0;
      const hasQty = qty > 0;
      const safeName = esc(p.name);
      return `
        <article class="product-card ${hasQty?'has-qty':''}" data-plu="${esc(p.plu)}">
          <div class="product-img-wrap">
            ${p.image
              ? `<img src="${esc(p.image)}" alt="${safeName}" loading="lazy"
                   onerror="this.outerHTML='<div class=&quot;product-img-fallback&quot;>${fb}</div>'">`
              : `<div class="product-img-fallback">${fb}</div>`}
          </div>
          <div class="product-info">
            <div class="product-plu">PLU <span class="plu-num">${esc(p.plu)}</span></div>
            <h3 class="product-name">${safeName}</h3>
            <div class="product-meta-row">
              ${p.brand ? `<span class="product-brand">${esc(p.brand)}</span>` : ''}
              ${p.pkg ? `<span class="product-pkg">${esc(p.pkg)}</span>` : ''}
            </div>
            <div class="product-price">
              <span class="currency">$</span>${p.price.toFixed(2)}<span class="per"> /caja</span>
            </div>
            <div class="qty-controls">
              <button class="qty-btn minus" data-action="dec" data-plu="${esc(p.plu)}" ${qty===0?'disabled':''} aria-label="Disminuir">−</button>
              <div class="qty-display">${qty}</div>
              <button class="qty-btn plus" data-action="inc" data-plu="${esc(p.plu)}" aria-label="Aumentar">+</button>
            </div>
          </div>
        </article>
      `;
    }

    // ============================================================
    // QTY CHANGES
    // ============================================================
    function changeQty(plu, delta) {
      const cur = QTY[plu] || 0;
      const next = Math.max(0, Math.min(999, cur + delta));
      if (next === cur) return;
      if (next === 0) delete QTY[plu];
      else QTY[plu] = next;
      saveState();
      updateCardUI(plu);
      updateFab();
      // Si el modal está abierto, re-renderizarlo
      if ($('#orderModal').classList.contains('visible')) renderModal();
    }

    function updateCardUI(plu) {
      const card = $(`.product-card[data-plu="${CSS.escape(plu)}"]`);
      if (!card) return;
      const qty = QTY[plu] || 0;
      card.classList.toggle('has-qty', qty > 0);
      card.querySelector('.qty-display').textContent = qty;
      card.querySelector('.minus').disabled = qty === 0;
    }

    // ============================================================
    // FAB
    // ============================================================
    function orderStats() {
      const lines = Object.entries(QTY).filter(([_, q]) => q > 0);
      let items = 0, total = 0;
      lines.forEach(([plu, q]) => {
        items += q;
        const p = PRODUCTS.find(x => x.plu === plu);
        if (p) total += p.price * q;
      });
      return { lineCount: lines.length, items, total };
    }

    function updateFab() {
      const { lineCount, items, total } = orderStats();
      const fab = $('#fabBtn');
      if (lineCount === 0) {
        fab.classList.add('empty');
        fab.disabled = true;
        $('#fabLabel').textContent = 'Tu orden está vacía';
        $('#fabItems').textContent = 'Agrega productos para empezar';
      } else {
        fab.classList.remove('empty');
        fab.disabled = false;
        $('#fabLabel').textContent = `Ver mi orden — ${fmt$(total)}`;
        $('#fabItems').textContent = `${items} caja${items===1?'':'s'} · ${lineCount} producto${lineCount===1?'':'s'}`;
      }
    }

    // ============================================================
    // MODAL — Order preview
    // ============================================================
    function openModal() {
      if (orderStats().lineCount === 0) {
        showToast('Tu orden está vacía. Agrega productos primero.');
        return;
      }
      renderModal();
      $('#orderModal').classList.add('visible');
      $('#orderModal').setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }
    function closeModal() {
      $('#orderModal').classList.remove('visible');
      $('#orderModal').setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }

    function renderModal() {
      const { lineCount, items, total } = orderStats();
      const body = $('#modalBody');

      if (lineCount === 0) {
        body.innerHTML = `
          <div class="empty-state">
            <span class="emoji">🛒</span>
            <p>Tu orden está vacía.</p>
          </div>`;
        $('#sendWaBtn').setAttribute('disabled', 'disabled');
        $('#sendWaBtn').style.pointerEvents = 'none';
        $('#sendWaBtn').style.opacity = '0.5';
        return;
      }

      const lines = Object.entries(QTY)
        .filter(([_, q]) => q > 0)
        .map(([plu, q]) => {
          const p = PRODUCTS.find(x => x.plu === plu);
          return p ? { ...p, qty: q, subtotal: p.price * q } : null;
        })
        .filter(Boolean)
        .sort((a, b) => a.name.localeCompare(b.name, 'es'));

      const linesHtml = lines.map(l => {
        const fb = CAT_EMOJI[l.category] || '📦';
        return `
          <div class="order-line">
            <div class="order-line-img">
              ${l.image
                ? `<img src="${esc(l.image)}" alt="" onerror="this.outerHTML='<span style=&quot;font-size:1.3rem;opacity:0.4;&quot;>${fb}</span>'">`
                : `<span style="font-size:1.3rem;opacity:0.4;">${fb}</span>`}
            </div>
            <div class="order-line-info">
              <div class="nm">${esc(l.name)}</div>
              <div class="meta">PLU ${esc(l.plu)} · ${fmt$(l.price)}/caja</div>
            </div>
            <div class="order-line-qty">
              <button data-modal-action="dec" data-plu="${esc(l.plu)}" aria-label="Menos">−</button>
              <span class="qty-n">${l.qty}</span>
              <button data-modal-action="inc" data-plu="${esc(l.plu)}" aria-label="Más">+</button>
            </div>
            <div class="order-line-subtotal">${fmt$(l.subtotal)}</div>
          </div>
        `;
      }).join('');

      body.innerHTML = `
        ${linesHtml}
        <div class="order-form">
          <div class="form-row" id="customerRow">
            <label for="customerInput">Cliente <span class="req">*</span></label>
            <input type="text" id="customerInput" placeholder="Tu nombre o nombre del negocio"
                   value="${esc(_formData.customer || '')}" autocomplete="name" />
          </div>
          <div class="form-row">
            <label for="notesInput">Notas adicionales (opcional)</label>
            <textarea id="notesInput" placeholder="Ej: entregar en la mañana, dejar en bodega, etc.">${esc(_formData.notes || '')}</textarea>
          </div>
        </div>
        <div class="order-total-row">
          <span class="lbl">Total — ${items} caja${items===1?'':'s'}</span>
          <span class="val">${fmt$(total)}</span>
        </div>
      `;

      // Wire qty controls within modal
      body.querySelectorAll('[data-modal-action="inc"]').forEach(b => {
        b.addEventListener('click', () => changeQty(b.dataset.plu, +1));
      });
      body.querySelectorAll('[data-modal-action="dec"]').forEach(b => {
        b.addEventListener('click', () => changeQty(b.dataset.plu, -1));
      });
      // Wire form persistence
      $('#customerInput').addEventListener('input', e => {
        _formData.customer = e.target.value;
        saveForm();
        $('#customerRow').classList.remove('error');
      });
      $('#notesInput').addEventListener('input', e => {
        _formData.notes = e.target.value;
        saveForm();
      });

      // Re-enable send button
      $('#sendWaBtn').removeAttribute('disabled');
      $('#sendWaBtn').style.pointerEvents = '';
      $('#sendWaBtn').style.opacity = '';
    }

    // ============================================================
    // GENERAR MENSAJE DE WHATSAPP
    // ============================================================
    function buildWhatsAppUrl() {
      const customer = (_formData.customer || '').trim();
      if (!customer) {
        $('#customerRow')?.classList.add('error');
        $('#customerInput')?.focus();
        showToast('Por favor agrega el nombre del cliente.');
        return null;
      }

      const lines = Object.entries(QTY)
        .filter(([_, q]) => q > 0)
        .map(([plu, q]) => {
          const p = PRODUCTS.find(x => x.plu === plu);
          return p ? { ...p, qty: q, subtotal: p.price * q } : null;
        })
        .filter(Boolean)
        .sort((a, b) => a.name.localeCompare(b.name, 'es'));

      if (lines.length === 0) {
        showToast('Tu orden está vacía.');
        return null;
      }

      const total = lines.reduce((acc, l) => acc + l.subtotal, 0);
      const date = new Date().toLocaleDateString('es-MX', { day: '2-digit', month: 'long', year: 'numeric' });
      const notes = (_formData.notes || '').trim();

      const productLines = lines.map(l =>
        `- [${l.plu}] ${l.name} x${l.qty} caja(s) — $${l.subtotal.toFixed(2)}`
      ).join('\n');

      const msg = `📦 *ORDEN CENTRAL TRADE DISTRIBUTION*
Cliente: ${customer}
Fecha: ${date}

*Productos:*
${productLines}

💰 *TOTAL: $${total.toFixed(2)}*${notes ? `\n📝 Notas: ${notes}` : ''}`;

      return `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
    }

    // ============================================================
    // INIT
    // ============================================================
    async function init() {
      loadState();

      try {
        const res = await fetch('./produce.csv', { cache: 'no-cache' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const text = await res.text();
        PRODUCTS = parseCSV(text);

        renderCatNav();
        renderGrid();
        updateFab();

        // Search
        $('#searchInput').addEventListener('input', e => {
          _query = e.target.value.trim().toUpperCase();
          renderGrid();
        });

        // FAB → modal
        $('#fabBtn').addEventListener('click', openModal);

        // Modal close
        $('#modalClose').addEventListener('click', closeModal);
        $('#orderModal').addEventListener('click', e => {
          if (e.target === $('#orderModal')) closeModal();
        });
        document.addEventListener('keydown', e => {
          if (e.key === 'Escape') closeModal();
        });

        // Clear order
        $('#clearBtn').addEventListener('click', () => {
          if (orderStats().lineCount === 0) return;
          if (!confirm('¿Vaciar toda la orden?')) return;
          Object.keys(QTY).forEach(k => delete QTY[k]);
          saveState();
          updateFab();
          renderGrid();
          renderModal();
        });

        // Send WhatsApp — generamos el URL al momento del click para
        // validar form y construir mensaje fresco
        $('#sendWaBtn').addEventListener('click', e => {
          const url = buildWhatsAppUrl();
          if (!url) {
            e.preventDefault();
            return;
          }
          $('#sendWaBtn').href = url;
          // El target=_blank y href ya están seteados, se abre solo
        });

      } catch (e) {
        console.error(e);
        $('#loadingMsg').innerHTML = `⚠️ No se pudo cargar el catálogo: ${esc(e.message)}`;
      }
    }
    init();
  </script>
</body>
</html>
